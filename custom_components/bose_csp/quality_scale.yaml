rules:
  # Bronze
  action-setup:
    status: exempt
    comment: Integration does not register custom actions.
  appropriate-polling:
    status: done
    comment: |
      The device speaks a request/response protocol with no unsolicited
      events, so the library polls it (volume ~5s, mute/source/AV ~30s) over a
      persistent TCP socket and pushes parsed results into the coordinator via
      callbacks. iot_class is local_polling accordingly.
  brands:
    status: todo
    comment: Brand assets need to be added to the brands repository.
  common-modules:
    status: done
    comment: Uses coordinator.py and entity.py base class.
  config-flow:
    status: done
    comment: Config flow implemented with connection test.
  config-flow-test-coverage:
    status: todo
    comment: Tests not yet written.
  dependency-transparency:
    status: done
    comment: Uses py-bose-csp PyPI package.
  docs-actions:
    status: exempt
    comment: No custom actions.
  docs-high-level-description:
    status: todo
    comment: Documentation not yet written.
  docs-installation-instructions:
    status: todo
    comment: Documentation not yet written.
  docs-removal-instructions:
    status: todo
    comment: Documentation not yet written.
  entity-event-setup:
    status: exempt
    comment: No event entities.
  entity-unique-id:
    status: done
    comment: Unique ID is host-zone_name.
  has-entity-name:
    status: done
    comment: _attr_has_entity_name = True on base entity.
  runtime-data:
    status: done
    comment: Uses ConfigEntry.runtime_data with BoseCSPData dataclass.
  test-before-configure:
    status: done
    comment: Config flow tests connection before creating entry.
  test-before-setup:
    status: done
    comment: async_setup_entry connects and raises ConfigEntryNotReady on failure.
  unique-config-entry:
    status: done
    comment: Uses host as unique ID, aborts if already configured.

  # Silver
  config-entry-unloading:
    status: done
    comment: async_unload_entry disconnects device and unloads platforms.
  log-when-unavailable:
    status: done
    comment: Coordinator logs availability changes.
  entity-unavailable:
    status: done
    comment: CoordinatorEntity handles unavailability automatically.
  action-exceptions:
    status: done
    comment: Commands catch BoseCSPCommandError and log errors.
  reauthentication-flow:
    status: exempt
    comment: No authentication required for this device.
  parallel-updates:
    status: done
    comment: PARALLEL_UPDATES = 0 on all platforms (coordinator-driven, no per-entity polling).
  test-coverage:
    status: todo
    comment: Tests not yet written.
  integration-owner:
    status: done
    comment: "@BWilky listed as codeowner."
  docs-configuration-parameters:
    status: todo
    comment: Documentation not yet written.
  docs-troubleshooting:
    status: todo
    comment: Documentation not yet written.

  # Gold
  devices:
    status: done
    comment: Device info provided with identifiers, manufacturer, model.
  diagnostics:
    status: done
    comment: diagnostics.py dumps entry/options (host redacted), zone states, health status.
  discovery:
    status: todo
    comment: >
      Manual configuration only; the device exposes no usable network discovery
      service (no advertised mDNS/SSDP and no stable ID over the control link).
  discovery-update-info:
    status: todo
    comment: Not implemented (no network discovery; entry keys on host/IP).
  docs-data-update:
    status: todo
    comment: Documentation not yet written.
  docs-examples:
    status: todo
    comment: Documentation not yet written.
  docs-known-limitations:
    status: todo
    comment: Documentation not yet written.
  docs-supported-devices:
    status: todo
    comment: Documentation not yet written.
  docs-supported-functions:
    status: todo
    comment: Documentation not yet written.
  docs-use-cases:
    status: todo
    comment: Documentation not yet written.
  dynamic-devices:
    status: exempt
    comment: Device zones are configured at setup time.
  entity-category:
    status: done
    comment: >
      Health sensor uses EntityCategory.DIAGNOSTIC; the media player and
      AutoVolume switch are primary controls.
  entity-device-class:
    status: done
    comment: >
      Health sensor uses SensorDeviceClass.ENUM; the media player and switch
      have no applicable device class.
  entity-disabled-by-default:
    status: exempt
    comment: All entities should be enabled by default.
  entity-translations:
    status: done
    comment: >
      Switch and sensor use translation_key + an entity section in
      strings.json (with sensor state translations); media player names are
      device-provided zone names.
  exception-translations:
    status: done
    comment: >
      Command handlers raise HomeAssistantError with translation_domain/key;
      messages defined under exceptions in strings.json.
  icon-translations:
    status: exempt
    comment: Uses default media player icon.
  reconfiguration-flow:
    status: done
    comment: async_step_reconfigure allows changing the device IP without re-adding.
  repair-issues:
    status: exempt
    comment: No known repair scenarios.
  stale-devices:
    status: exempt
    comment: Devices are tied to config entries.

  # Platinum
  async-dependency:
    status: done
    comment: bose-csp-api uses asyncio.
  inject-websession:
    status: exempt
    comment: Uses raw TCP, not HTTP.
  strict-typing:
    status: todo
    comment: >
      Library now ships py.typed; integration to be added to the core
      .strict-typing list and fully annotated at submission.
